---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: data-retrieval
    component: backend
spec:
  type: ClusterIP
  ports:
  - port: 5001
    targetPort: 5001
    protocol: TCP
    name: http
  selector:
    app: data-retrieval
    component: backend

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    app: data-retrieval
    component: frontend
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: data-retrieval
    component: frontend

