---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: output-data-pvc
  labels:
    app: data-retrieval
    component: backend
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: gp2

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: checkpoint-data-pvc
  labels:
    app: data-retrieval
    component: backend
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: gp2

